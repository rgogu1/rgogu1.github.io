<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Portfolio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4e6"/>
      <stop offset="0.55" stop-color="#f7f2ea"/>
      <stop offset="1" stop-color="#eef1f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e43d12"/>
      <stop offset="1" stop-color="#1f4aa8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="120" cy="520" r="240" fill="#e43d12" opacity="0.12"/>
  <circle cx="1120" cy="80" r="260" fill="#1f4aa8" opacity="0.11"/>
  <circle cx="930" cy="520" r="200" fill="#0b6e4f" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="90" y="120" width="1020" height="390" rx="34" fill="#ffffff" opacity="0.72"/>
    <rect x="90" y="120" width="1020" height="390" rx="34" fill="url(#accent)" opacity="0.06"/>
  </g>

  <g font-family="Iowan Old Style, Palatino Linotype, Palatino, Book Antiqua, serif" fill="#151515">
    <text x="140" y="250" font-size="58" font-weight="800" letter-spacing="-1.2">Your Name</text>
    <text x="140" y="312" font-size="28" font-weight="600" opacity="0.82">Software Engineer</text>
    <text x="140" y="372" font-size="26" opacity="0.78">Projects · Experience · Contact</text>
  </g>

  <g>
    <rect x="140" y="410" width="210" height="56" rx="28" fill="url(#accent)"/>
    <text x="168" y="448" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace" font-size="18" fill="#fff" opacity="0.95">portfolio</text>
  </g>
</svg>

